spring:
  datasource:
    url: jdbc:h2:mem:tienda_ropa;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

  devtools:
    restart:
      enabled: true

server:
  port: 8081
  servlet:
    context-path: /

app:
  version: ${APP_VERSION:1.0.0-local}
  name: Tienda Ropa API